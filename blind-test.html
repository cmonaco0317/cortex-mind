<!DOCTYPE html><html><head><meta charset="utf-8">
<title>Cortex — blind insight test (blind-test.html)</title>
<style>
  body{background:#05060d;color:#cfe6f2;font:14px/1.5 -apple-system,system-ui,sans-serif;max-width:760px;margin:0 auto;padding:28px}
  h1{font-size:19px;color:#9fe6ff} .sub{color:#5f8296;font-size:13px;margin-bottom:22px}

  .src{font-weight:600;color:#eafaff} .src small{display:block;color:#6f95a8;font-weight:400;margin-top:3px}
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  .opt{border:1px solid rgba(80,160,200,.25);border-radius:8px;padding:10px;cursor:pointer}
  .opt.sel{border-color:#4fd6f5;background:rgba(30,90,120,.3)}
  .opt b{color:#bde8ff} .opt small{display:block;color:#6f95a8;margin-top:4px}
  .neither{margin-top:8px;font-size:12px;color:#6f95a8;cursor:pointer}
  .neither.sel{color:#4fd6f5}
  button{background:#1c4a5e;color:#dff;border:1px solid #4fd6f5;border-radius:8px;padding:10px 20px;font-size:14px;cursor:pointer;margin-top:8px}
  #verdict{margin-top:20px;padding:18px;border-radius:10px;font-size:16px;display:none}
  .go{background:rgba(30,120,60,.3);border:1px solid #4ade80;color:#c6f6d5}
  .stop{background:rgba(140,40,40,.3);border:1px solid #f87171;color:#fecaca}

</style></head><body>
<h1>Cortex — blind insight test</h1>
<div class="sub">For each concept, pick the connection that is a <b>genuinely novel &amp; useful</b> insight
(better than an obvious "related item"). If neither is, pick "neither". You can't tell which is the engine — that's the point.
Corpus: <b>blind-test.html</b> · 20 items. 100% local.</div>
<div id="rows"></div>
<button onclick="score()">Score it</button>
<div id="verdict"></div>
<script>
const DATA = [{"source_label": "Prefrontal Cortex", "source_text": "The front of the brain that supports planning, working memory, self-control, and abstract goals. It holds information online and overrides impulses, the executive that steers behavior.", "options": [{"kind": "engine", "label": "Neural Coding", "text": "How populations of neurons represent information in their firing rates, timing, and patterns. Cracking the code means reading meaning off of spikes, the brain's own embedding scheme."}, {"kind": "baseline", "label": "The Predictive Brain", "text": "The framing of the brain as a hierarchical prediction engine that constantly forecasts sensation and learns from its errors. It links neuroscience, perception, and the self-supervised objectives of AI."}]}, {"source_label": "Divergent Thinking", "source_text": "The generation of many varied ideas by branching outward from a prompt, the expansive phase of creativity before convergence prunes. It samples widely across possibility space.", "options": [{"kind": "engine", "label": "Theory of Mind", "text": "The capacity to attribute beliefs, desires, and intentions to others and to oneself, enabling prediction of behavior. Modeling other minds may be as central as modeling the world."}, {"kind": "baseline", "label": "Openness to Experience", "text": "The disposition toward curiosity, imagination, and receptivity to new ideas and sensations. It broadens the range of what a mind samples and correlates strongly with creativity."}]}, {"source_label": "Gestalt Perception", "source_text": "The tendency to perceive organized wholes rather than isolated parts, grouping elements by proximity, similarity, and continuity. The whole is experienced as more than the sum of its features.", "options": [{"kind": "engine", "label": "Power Law", "text": "A relationship where one quantity scales as a power of another, producing heavy tails with no typical scale, from city sizes to neuronal avalanches. Its ubiquity hints at shared generative mechanisms."}, {"kind": "baseline", "label": "The Binding Problem", "text": "The puzzle of how separately processed features like color, shape, and motion are unified into a single coherent experience of one object. What stitches the scattered pieces into a whole?"}]}, {"source_label": "Philosophical Zombie", "source_text": "A hypothetical being physically identical to a person but wholly lacking inner experience, used to argue that consciousness is not entailed by physical facts alone. Its conceivability fuels the hard problem.", "options": [{"kind": "engine", "label": "Engram", "text": "The physical trace a memory leaves in the brain, a distributed set of neurons and strengthened synapses that can be reactivated to recall the experience. The sought-after seat of a specific memory."}, {"kind": "baseline", "label": "Panpsychism", "text": "The view that experience is a fundamental and ubiquitous feature of reality, present in some minimal form even in matter. It answers the hard problem by refusing to let mind emerge from the mindless."}]}, {"source_label": "Cognitive Load", "source_text": "The total demand a task places on limited mental resources, especially working memory. Exceed it and comprehension and performance break down, which is why we chunk and offload.", "options": [{"kind": "engine", "label": "Abstraction", "text": "Stripping away detail to capture the essence shared across instances, letting a single idea cover many cases. It is the cognitive act that good learned representations perform automatically."}, {"kind": "baseline", "label": "Working Memory", "text": "The small, fast store that holds a handful of items in mind while you manipulate them, the mental workspace of reasoning. Its narrow capacity is cognition's analog of a limited context window."}]}, {"source_label": "World Model", "source_text": "An internal predictive model of how an environment evolves, letting an agent imagine consequences before acting. It links machine planning to the brain's simulations of possible futures.", "options": [{"kind": "engine", "label": "Reinforcement Learning", "text": "Learning by trial and error, where an agent takes actions, receives rewards, and adjusts its policy to maximize long-term return. Its reward signals mirror dopamine-driven learning in the brain."}, {"kind": "baseline", "label": "Mental Simulation", "text": "Running an internal model forward to preview the consequences of actions or events before committing. Imagination in the service of prediction, it lets us test futures safely in the mind."}]}, {"source_label": "Stigmergy", "source_text": "Indirect coordination in which agents leave traces in a shared environment that guide the actions of others, like ants laying pheromone. The medium becomes the memory and the message.", "options": [{"kind": "engine", "label": "Cybernetics", "text": "The science of control and communication through feedback in animals and machines alike. It framed goal-directed behavior as error correction and seeded much of AI and systems thinking."}, {"kind": "baseline", "label": "Swarm Behavior", "text": "Coordinated collective action emerging from many simple agents following local rules, as in ant colonies and bird flocks. Intelligence appears at the group level that no individual possesses."}]}, {"source_label": "Pretraining", "source_text": "The initial, expensive phase where a model absorbs general structure from huge unlabeled corpora, building reusable representations before any task-specific tuning, much as early development lays down broad priors.", "options": [{"kind": "engine", "label": "Diffusion Model", "text": "A generative model that learns to reverse a gradual noising process, sculpting coherent images or audio out of pure noise step by step. The denoising trajectory resembles a dream condensing into form."}, {"kind": "baseline", "label": "In-Context Learning", "text": "A large model's ability to learn a task on the fly from examples placed in its prompt, without any weight updates, as if the context window were a scratchpad of temporary working memory."}]}, {"source_label": "Prediction", "source_text": "The brain's relentless anticipation of what comes next, from the next word to the next sensation. Much of cognition is a forward-looking model tested against arriving reality.", "options": [{"kind": "engine", "label": "Serotonin", "text": "A neuromodulator that shapes mood, patience, and the valuation of time, influencing whether an animal waits for larger later rewards. It tunes the emotional weather in which cognition unfolds."}, {"kind": "baseline", "label": "Predictive Coding", "text": "A theory that the brain constantly predicts incoming sensations and propagates only the errors, updating its models to minimize surprise. Perception becomes controlled hallucination checked against reality."}]}, {"source_label": "Glutamate", "source_text": "The brain's dominant excitatory neurotransmitter, driving the fast signaling and synaptic strengthening that underlie learning and memory. Too much of it, though, is toxic to neurons.", "options": [{"kind": "engine", "label": "Refractory Period", "text": "The brief window after a neuron fires when it cannot fire again, setting a ceiling on firing rate and ensuring signals travel one way. A built-in reset that shapes neural timing."}, {"kind": "baseline", "label": "GABA", "text": "The brain's main inhibitory neurotransmitter, which quiets neurons and sculpts activity by suppressing noise. Balanced against excitation, it keeps networks from runaway firing and seizure."}]}, {"source_label": "Modularity", "source_text": "The organization of a system into semi-independent clusters that interact more within than between, easing evolution, robustness, and understanding. Brains and networks are richly modular.", "options": [{"kind": "engine", "label": "Plasticity", "text": "The general capacity of a nervous system, or a learning model, to change its structure and connections in response to experience. It is the shared root of biological learning and artificial fine-tuning."}, {"kind": "baseline", "label": "Resilience", "text": "A system's ability to absorb shocks and reorganize while retaining its essential function. Distributed, redundant structure lets networks bend without breaking."}]}, {"source_label": "Play", "source_text": "Freely chosen, intrinsically rewarding exploration that builds skills and models in a low-stakes way. Across species it is how the young rehearse the world and stumble onto the new.", "options": [{"kind": "engine", "label": "Generative Model", "text": "A model that learns the distribution of data well enough to synthesize new samples, whether text, images, or sound. Generation is recombination: producing novel instances from absorbed structure."}, {"kind": "baseline", "label": "Exploratory Drive", "text": "The built-in impulse of animals and agents to probe, sample, and manipulate their surroundings even without extrinsic reward. Curiosity as a basic motivator that seeds knowledge and competence."}]}, {"source_label": "Few-Shot Learning", "source_text": "The ability to grasp a new task from only a handful of examples, leaning on rich prior structure. It reflects how strong priors let both minds and models learn fast from little.", "options": [{"kind": "engine", "label": "Emergent Capabilities", "text": "Abilities that appear abruptly in large models once scale crosses a threshold, absent in smaller versions and never directly trained. A striking instance of the whole exceeding the sum of its parameters."}, {"kind": "baseline", "label": "Schema", "text": "An organized framework of prior knowledge that guides how new information is interpreted and remembered. Schemas speed understanding but can also distort perception toward what we expect."}]}, {"source_label": "Attention (ML)", "source_text": "A learned mechanism that lets a model dynamically weigh which parts of its input matter most for each output, computing relevance scores across tokens. It echoes selective attention in the brain, allocating limited capacity to the most salient signals.", "options": [{"kind": "engine", "label": "Gamma Oscillations", "text": "Fast brain rhythms around forty hertz linked to focused attention, perception, and the binding of features into unified objects. Their synchrony may knit scattered signals into a single experience."}, {"kind": "baseline", "label": "Priming", "text": "When exposure to one stimulus subtly shifts the response to a later one, activating related representations below awareness. Context preloads the mind much as a prompt biases a model."}]}, {"source_label": "Novelty-Seeking", "source_text": "The drive toward the new and unfamiliar, tuned by dopamine and central to exploration and learning. Novelty carries the promise of information, and the brain treats it as intrinsically rewarding.", "options": [{"kind": "engine", "label": "Embodied Cognition", "text": "The stance that thinking is grounded in bodily action and sensorimotor loops rather than abstract symbol shuffling. It ties cognition to embodiment and challenges disembodied models of mind."}, {"kind": "baseline", "label": "Intellectual Humility", "text": "The recognition of the limits of one's knowledge, which keeps curiosity alive by treating beliefs as revisable. Knowing what one does not know is the doorway to wanting to learn."}]}, {"source_label": "Intrinsic Motivation", "source_text": "The pull to act for the inherent satisfaction of the activity, such as curiosity or mastery, rather than for external reward. It drives exploration where explicit payoffs are absent or distant.", "options": [{"kind": "engine", "label": "Nonlinearity", "text": "The property that outputs are not proportional to inputs, so small causes can have large effects and vice versa. It underlies thresholds, tipping points, and the surprises of complex systems."}, {"kind": "baseline", "label": "Wonder", "text": "The awe-tinged pull toward the vast, the beautiful, or the mysterious that opens the mind and invites inquiry. It is curiosity charged with emotion, the beginning of much thought and art."}]}, {"source_label": "Cognitive Bias", "source_text": "A systematic deviation from rational judgment arising from mental shortcuts. Biases are the predictable failure modes of fast heuristics that usually serve us well.", "options": [{"kind": "engine", "label": "The Turing Test", "text": "A proposal to sidestep defining thought by asking whether a machine's conversation is indistinguishable from a human's. It reframes mind as behavior while leaving inner experience untouched."}, {"kind": "baseline", "label": "Heuristic", "text": "A mental rule of thumb that yields good-enough answers quickly by ignoring some information. Efficient and often accurate, heuristics are also the seedbed of systematic bias."}]}, {"source_label": "Adaptation", "source_text": "The ongoing adjustment of a system to better fit its environment, whether by evolution, learning, or self-tuning. It is the general process of which learning is one instance.", "options": [{"kind": "engine", "label": "Mental Model", "text": "An internal representation of how something works, used to explain, predict, and plan. We reason by running these simplified simulations, echoing an agent's internal world model."}, {"kind": "baseline", "label": "Feedback Loop", "text": "A circuit where a system's output feeds back to influence its input, amplifying change or restoring balance. Loops of reinforcement and correction are the engines of adaptation and stability."}]}, {"source_label": "Self-Organized Criticality", "source_text": "The tendency of some systems to tune themselves to the knife-edge between order and chaos, where responses span all scales. Brains near criticality may maximize their dynamic range and information capacity.", "options": [{"kind": "engine", "label": "Dual-Process Thinking", "text": "The framework contrasting fast, automatic, intuitive thought with slow, effortful, deliberate reasoning. The two systems trade speed for accuracy, and knowing which is running matters."}, {"kind": "baseline", "label": "Edge of Chaos", "text": "The narrow transitional zone between rigid order and turbulence where systems are most adaptive and computationally rich. Life, learning, and complex dynamics seem to favor this fertile border."}]}, {"source_label": "Chain of Thought", "source_text": "Prompting or training a model to reason step by step in writing before answering, which unlocks harder problem solving. Externalized intermediate steps act like a mind thinking aloud.", "options": [{"kind": "engine", "label": "Self-Supervised Learning", "text": "Training without human labels by inventing prediction tasks from the data itself, such as filling in masked words. It mirrors how brains learn from the structure of experience alone."}, {"kind": "baseline", "label": "Lateral Thinking", "text": "Solving problems by approaching them from unexpected angles rather than head-on logic, deliberately breaking assumptions. It jumps sideways to reach where straight reasoning stalls."}]}];
const shuffled = DATA.map(r => {
  const o = r.options.slice();
  if (Math.random() < 0.5) o.reverse();
  return {...r, options:o};
});
const picks = new Array(shuffled.length).fill(null);
const root = document.getElementById('rows');
shuffled.forEach((r,ri) => {
  const div = document.createElement('div'); div.className='row';
  const src = document.createElement('div'); src.className='src';
  src.innerHTML = '<span></span>';
  src.firstChild.textContent = r.source_label;
  const s2 = document.createElement('small'); s2.textContent = r.source_text; src.appendChild(s2);
  const opts = document.createElement('div'); opts.className='opts';
  r.options.forEach((o,oi) => {
    const el = document.createElement('div'); el.className='opt';
    const b=document.createElement('b'); b.textContent=o.label;
    const sm=document.createElement('small'); sm.textContent=o.text;
    el.append(b,sm);
    el.onclick=()=>{picks[ri]={kind:o.kind};[...opts.children].forEach(c=>c.classList.remove('sel'));el.classList.add('sel');nb.classList.remove('sel');};
    opts.appendChild(el);
  });
  const nb=document.createElement('div'); nb.className='neither'; nb.textContent='· neither is genuinely novel/useful';
  nb.onclick=()=>{picks[ri]={kind:'neither'};[...opts.children].forEach(c=>c.classList.remove('sel'));nb.classList.add('sel');};
  div.append(src,opts,nb); root.appendChild(div);
});
// Exact two-sided binomial test against p=0.5. Used instead of a fixed
// percentage bar: the old rule passed the engine at >=30% wins, which is at or
// BELOW chance once "neither" is an option -- it could print PASS while the
// baseline was actually preferred more than twice as often.
function logC(n,k){ let s=0; for(let i=1;i<=k;i++) s += Math.log(n-k+i) - Math.log(i); return s; }
function binomTwoSided(k,n){
  if(n===0) return 1;
  const pmf = (i)=> Math.exp(logC(n,i) - n*Math.LN2);
  const obs = pmf(k); let p=0;
  for(let i=0;i<=n;i++){ const pi=pmf(i); if(pi <= obs*(1+1e-9)) p += pi; }
  return Math.min(1,p);
}
function score(){
  const done = picks.filter(Boolean).length;
  if (done < shuffled.length) { alert('Rate all '+shuffled.length+' items first ('+done+' done)'); return; }
  const engineWins   = picks.filter(p=>p.kind==='engine').length;
  const baselineWins = picks.filter(p=>p.kind==='baseline').length;
  const neither      = picks.filter(p=>p.kind==='neither').length;
  const decisive     = engineWins + baselineWins;
  const p            = binomTwoSided(engineWins, decisive);
  const v = document.getElementById('verdict');
  v.style.display='block';

  const tally = '<b>engine ' + engineWins + ' · baseline ' + baselineWins
    + ' · neither ' + neither + '</b> (of ' + shuffled.length + ' rated)<br>'
    + 'Two-sided binomial test on the ' + decisive + ' decisive ratings: p = ' + p.toFixed(3) + '.';
  const caveat = '<small>One rater, n=' + shuffled.length + '. This measures whether '
    + 'THIS rater preferred the engine\u2019s leaps to the nearest-neighbour baseline on '
    + 'THIS corpus \u2014 not that the engine is good in general. A single-rater result is '
    + 'suggestive at best; it is not evidence of a general effect.</small>';

  if (decisive === 0) {
    v.className='meh';
    v.innerHTML = tally + '<br>\u2014 No decisive ratings: neither side was preferred anywhere. Inconclusive.' + caveat;
  } else if (p >= 0.05) {
    v.className='meh';
    v.innerHTML = tally + '<br>\u2014 <b>INCONCLUSIVE</b> at this sample size. The split is '
      + 'consistent with a coin flip, so this run supports no claim in either direction.' + caveat;
  } else if (engineWins > baselineWins) {
    v.className='go';
    v.innerHTML = tally + '<br>\u2705 The engine\u2019s leaps were preferred significantly more often than the baseline.' + caveat;
  } else {
    v.className='stop';
    v.innerHTML = tally + '<br>\uD83D\uDED1 The <b>baseline</b> was preferred significantly more often than the engine.' + caveat;
  }
}
</script></body></html>
