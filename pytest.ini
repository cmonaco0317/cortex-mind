[pytest]
# Collect only `test_*.py`, not pytest's second default glob `*_test.py`.
#
# blind_test.py is a CLI evaluation harness, not a test module — it has no test
# functions, only a main(). It matched `*_test.py` by accident, and because it
# imports numpy (which the test suite does not need), collection ABORTED for the
# whole repository: `python3 -m pytest` from the root exited on a collection
# error and ran nothing, including agent-insights' 78 tests.
#
# Every real test in this repo is named `test_*.py`, so narrowing the glob fixes
# it without renaming a file the README documents by name.
python_files = test_*.py
